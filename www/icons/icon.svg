<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 房子图标 -->
  <g transform="translate(256,220)" fill="none" stroke="#e94560" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="0,-100 -120,0 120,0" fill="#e94560" opacity="0.9"/>
    <rect x="-70" y="0" width="140" height="100" fill="#e94560" opacity="0.6" stroke="none"/>
    <rect x="-30" y="40" width="60" height="60" fill="#1a1a2e" stroke="none"/>
  </g>
  <!-- 进度条图标 -->
  <g transform="translate(256,370)" fill="none" stroke="#53d769" stroke-width="12" stroke-linecap="round">
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#ffffff" opacity="0.3"/>
    <line x1="-100" y1="0" x2="40" y2="0" stroke="#53d769"/>
    <circle cx="40" cy="0" r="10" fill="#53d769" stroke="none"/>
  </g>
  <!-- 对勾 -->
  <g transform="translate(380,120)" fill="none" stroke="#53d769" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="-20,10 -5,25 20,-5"/>
  </g>
</svg>
